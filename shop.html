<!DOCTYPE html>
<html lang="en">

<head>
    <title>PhinStore | JU</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/shop.css">
    <script src="js/items.js"></script>
    <script src="js/shop.js"></script>
</head>

<body>
    <header>
        <!-- Navigation bar -->
        <a href="index.html"><img class="logo-img" src="images/phinstore_Nameplate_white.png" alt="PhinStore logo"></a>
        <div class="HomeNav" id="TopNav">
            <a href="index.html" class="active">Home</a>
            <a href="shop.html">Shop</a>
            <a href="cart.html">Cart</a>
            <a href="about.html">About Us</a>
        </div>
    </header>
   <main class="shop-main">

    <div class="sidebar">
        <h2>Filters</h2>

        <div class="filter-box">
            <h4>Category</h4>
            <p><input type="checkbox" id="filter-electronics"> Electronics</p>
            <p><input type="checkbox" id="filter-computers"> Computers &amp; Laptops</p>
            <p><input type="checkbox" id="filter-gaming"> Gaming &amp; Entertainment</p>
        </div>

        <div class="filter-box">
            <h4>Price</h4>
            <p><input type="checkbox" id="filter-under50"> Under $50</p>
            <p><input type="checkbox" id="filter-50to200"> $50 - $200</p>
            <p><input type="checkbox" id="filter-over200"> $200+</p>
        </div>

        <div class="filter-box">
            <h4>Rating</h4>
            <p><input type="checkbox" id="filter-rating5"> ★★★★★</p>
            <p><input type="checkbox" id="filter-rating4"> ★★★★+</p>
        </div>
    </div>

    <div class="products-area">
        <h1>Shop Products</h1>
        <div id="products-list"></div>
    </div>
    </body>
</html>
